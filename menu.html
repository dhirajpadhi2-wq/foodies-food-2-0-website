<!DOCTYPE html>
<html>
<head>

<title>Foodies Food Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}

h1{
color:gold;
}

/* CATEGORY SLIDER */

.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:#111;
position:sticky;
top:0;
}

.categories button{
background:#222;
color:white;
border:1px solid gold;
padding:8px 15px;
cursor:pointer;
white-space:nowrap;
}

.categories button:hover{
background:gold;
color:black;
}

/* MENU */

.category-title{
color:gold;
margin-top:30px;
}

.menu-item{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
padding:10px;
}

.qty-btn{
background:gold;
border:none;
padding:5px 10px;
cursor:pointer;
}

.add-btn{
background:gold;
border:none;
padding:5px 10px;
cursor:pointer;
}

/* CART POPUP */

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:gold;
padding:15px;
border-radius:50%;
cursor:pointer;
font-weight:bold;
}

.cart-popup{
position:fixed;
bottom:-500px;
left:0;
width:100%;
background:#111;
border-top:3px solid gold;
padding:20px;
transition:0.4s;
max-height:80vh;
overflow:auto;
}

.cart-popup.active{
bottom:0;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
}

.order-btn{
background:#25D366;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
width:100%;
}

.clear-btn{
background:red;
border:none;
padding:8px;
margin-top:5px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<header>

<h1>Foodies Food Menu</h1>

</header>

<div class="categories" id="categorySlider"></div>

<div id="menuContainer"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒
</div>

<div class="cart-popup" id="cartPopup">

<h3>🛒 Your Cart</h3>

<ul id="cartItems"></ul>

<h3>Total ₹ <span id="total">0</span></h3>

<h4>Customer Details</h4>

<input id="custName" placeholder="Your Name">

<input id="custPhone" placeholder="Phone Number">

<select id="orderType">
<option>Home Delivery</option>
<option>Dine In</option>
<option>Take Away</option>
</select>

<input id="landmark" placeholder="Enter Landmark">

<button class="order-btn" onclick="orderWhatsApp()">Order on WhatsApp</button>

<button class="clear-btn" onclick="clearCart()">Clear Cart</button>

</div>

<script>

let cart=[];
let total=0;

function toggleCart(){

document.getElementById("cartPopup").classList.toggle("active");

}

fetch("menu.json")

.then(res=>res.json())

.then(data=>{

let menuContainer=document.getElementById("menuContainer");
let categorySlider=document.getElementById("categorySlider");

data.menu.forEach((category,index)=>{

let btn=document.createElement("button");
btn.innerText=category.category;

btn.onclick=()=>{
document.getElementById("cat"+index).scrollIntoView({behavior:"smooth"});
}

categorySlider.appendChild(btn);

let title=document.createElement("h2");
title.className="category-title";
title.id="cat"+index;
title.innerText=category.category;

menuContainer.appendChild(title);

category.items.forEach(item=>{

let qty=1;

let div=document.createElement("div");
div.className="menu-item";

div.innerHTML=`

<span>${item.name} - ₹${item.price}</span>

<div>

<button class="qty-btn">-</button>
<span class="qty">1</span>
<button class="qty-btn">+</button>
<button class="add-btn">Add</button>

</div>

`;

let qtySpan=div.querySelector(".qty");

let buttons=div.querySelectorAll(".qty-btn");

buttons[0].onclick=()=>{
if(qty>1){
qty--;
qtySpan.innerText=qty;
}
}

buttons[1].onclick=()=>{
qty++;
qtySpan.innerText=qty;
}

div.querySelector(".add-btn").onclick=()=>{

let price=item.price*qty;

total+=price;

cart.push(item.name+" x"+qty);

document.getElementById("total").innerText=total;

let li=document.createElement("li");
li.innerText=item.name+" x"+qty;

document.getElementById("cartItems").appendChild(li);

}

menuContainer.appendChild(div);

});

});

});

function clearCart(){

cart=[];
total=0;

document.getElementById("cartItems").innerHTML="";
document.getElementById("total").innerText=0;

}

function orderWhatsApp(){

let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let type=document.getElementById("orderType").value;
let landmark=document.getElementById("landmark").value;

let message="Hello Foodies Food%0A";

message+="Name: "+name+"%0A";
message+="Phone: "+phone+"%0A%0A";

message+="Order:%0A";

cart.forEach(i=>{
message+=i+"%0A";
});

message+="%0AOrder Type:"+type;
message+="%0ALandmark:"+landmark;
message+="%0ATotal ₹"+total;

window.open("https://wa.me/919938467223?text="+message);

}

</script>

</body>
</html>
