<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foodies Food 2.0</title>

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}
  
header h1{
color:gold;
letter-spacing:2px;
}

nav{
display:flex;
justify-content:center;
gap:20px;
padding:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:gold;
}

.hero{
height:60vh;
background:url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092");
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h2{
font-size:40px;
background:rgba(0,0,0,0.6);
padding:20px;
border:2px solid gold;
}

section{
padding:40px;
}

h2{
color:gold;
text-align:center;
margin-bottom:20px;
}

.menu-item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:10px;
}

.menu-item:hover{
background:#111;
}
  
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 15px gold;
}

.contact{
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
background:gold;
border:none;
padding:10px 20px;
cursor:pointer;
font-weight:bold;
}

.map{
margin-top:30px;
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
border-top:2px solid gold;
}

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
color:gold;
font-size:25px;
}

  .menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.food-card{
background:#111;
padding:15px;
border-radius:15px;
text-align:center;
transition:.4s;
border:1px solid #222;
}

.food-card:hover{
transform:rotateY(10deg) scale(1.05);
box-shadow:0 0 20px gold;
}

.food-card img{
width:100%;
border-radius:10px;
}

.price{
color:gold;
font-weight:bold;
}

.add-btn{
background:gold;
border:none;
padding:8px 15px;
cursor:pointer;
margin-top:10px;
}

.cart{
position:fixed;
right:10px;
bottom:10px;
background:#111;
padding:20px;
border-radius:10px;
border:1px solid gold;
width:200px;
}

.slider img{
width:100%;
height:300px;
object-fit:cover;
border-bottom:2px solid gold;
}
  
</style>
</head>
  
<body>

<div class="loader" id="loader">
Loading Foodies Food 2.0...
</div>

<header>

<h1>Foodies Food 2.0</h1>

<nav>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

</header>
  
<div class="slider">
<img id="slide" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
</div>

  <section id="menu">

<h2>Our Special Menu</h2>

<div class="menu-grid" id="menu-container"></div>

  </section>
  
<div class="hero">
<h2>Delicious Food • Luxury Taste</h2>
</div>

<section id="menu">

<h2>Our Menu</h2>

<div id="menu-container"></div>

</section>

<section id="gallery">

<h2>Food Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1604908176997-43154a4d02e0">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

</div>

</section>

<section id="contact">

<h2>Contact Us</h2>

<div class="contact">

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Message"></textarea>

<button type="submit">Send Message</button>

</form>

<div class="map">

<iframe src="https://maps.google.com/maps?q=foodies%20food%202.0&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="250"></iframe>

</div>

</div>

</section>

  <div class="cart">

<h3>🛒 Cart</h3>

<ul id="cart-items"></ul>

<p>Total: ₹<span id="total">0</span></p>

<button onclick="orderWhatsApp()">Order via WhatsApp</button>

  </div>
  
<footer>

<p>© 2026 Foodies Food 2.0</p>

</footer>

<script>

window.onload=function(){
document.getElementById("loader").style.display="none";
}

fetch("menu.json")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("menu-container");

data.menu.forEach(category=>{

let title=document.createElement("h3");
title.innerText=category.category;
title.style.color="gold";

container.appendChild(title);

category.items.forEach(item=>{

let div=document.createElement("div");
div.className="menu-item";

div.innerHTML=`<span>${item.name}</span><span>${item.price}</span>`;

container.appendChild(div);

});

});

});

  let cart=[];
let total=0;

function addToCart(name,price){

cart.push(name);

total+=parseInt(price);

document.getElementById("total").innerText=total;

let li=document.createElement("li");

li.innerText=name;

document.getElementById("cart-items").appendChild(li);

}

function orderWhatsApp(){

let message="Hello, I want to order:%0A";

cart.forEach(item=>{
message+=item+"%0A";
});

message+="Total: ₹"+total;

let phone="919938467223";

window.open(`https://wa.me/${phone}?text=${message}`);

}

fetch("menu.json")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("menu-container");

data.menu.forEach(category=>{

category.items.forEach(item=>{

let card=document.createElement("div");

card.className="food-card";

card.innerHTML=`

<img src="https://source.unsplash.com/300x200/?food">

<h3>${item.name}</h3>

<p class="price">₹${item.price}</p>

<button class="add-btn" onclick="addToCart('${item.name}','${item.price}')">Add to Cart</button>

`;

container.appendChild(card);

});

});

});

let images=[
"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38",
"https://images.unsplash.com/photo-1550547660-d9450f859349",
"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
];

let i=0;

setInterval(()=>{

i=(i+1)%images.length;

document.getElementById("slide").src=images[i];

},3000);
  
</script>

</body>
</html>
