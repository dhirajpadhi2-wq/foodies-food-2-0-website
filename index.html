<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Foodies Food 2.0</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

/* HEADER */

header{
background:black;
padding:15px;
border-bottom:2px solid gold;
position:sticky;
top:0;
z-index:1000;
}

header h1{
color:gold;
text-align:center;
margin:0;
}

nav{
display:flex;
justify-content:center;
gap:25px;
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:gold;
}

/* HERO */

.hero{
text-align:center;
padding:50px 20px;
background:linear-gradient(45deg,#111,#000);
}

.hero h2{
color:gold;
font-size:34px;
margin-bottom:10px;
}

.hero p{
color:#ccc;
}

/* SEARCH */

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
padding:10px;
width:80%;
max-width:400px;
border:none;
border-radius:5px;
}

/* CATEGORY SLIDER */

.category-slider{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.category-btn{
background:#111;
border:1px solid gold;
color:gold;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.category-btn:hover{
background:gold;
color:black;
}

/* MENU */

#menuContainer{
padding:10px;
}

#menuContainer h3{
color:gold;
border-bottom:1px solid #333;
padding-bottom:5px;
margin-top:25px;
}

.menu-item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:10px;
}

/* QUANTITY */

.qty-box{
display:flex;
gap:5px;
align-items:center;
}

.qty-btn{
background:gold;
border:none;
padding:5px 10px;
cursor:pointer;
}

.add-btn{
background:gold;
border:none;
padding:5px 10px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:10px;
bottom:70px;
background:#111;
padding:20px;
border-radius:10px;
width:260px;
border:1px solid gold;
max-height:350px;
overflow:auto;
}

.cart h3{
margin-top:0;
color:gold;
}

.cart-count{
background:gold;
color:black;
padding:2px 8px;
border-radius:10px;
margin-left:5px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:10px;
right:10px;
background:#25D366;
padding:15px;
border-radius:50px;
cursor:pointer;
font-size:20px;
}

/* FORM */

input,select{
width:100%;
padding:6px;
margin-top:5px;
border:none;
border-radius:4px;
}

/* THANK YOU */

.thankyou{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
border:2px solid gold;
padding:30px;
display:none;
text-align:center;
border-radius:10px;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #333;
margin-top:40px;
color:#aaa;
}

  .hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-box{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:10px;
}

.hero h2{
font-size:40px;
color:gold;
}

.hero p{
margin:10px 0 20px;
color:#ddd;
}

.hero-btn{
display:inline-block;
margin:5px;
padding:10px 20px;
background:gold;
color:black;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}
  
</style>

</head>

<body>

<header>

<h1>Foodies Food 2.0</h1>

<nav>

<a href="index.html">Home</a>

<a href="#menuContainer">Menu</a>

<a href="catering.html">Catering</a>

<a href="#">Cart <span class="cart-count" id="cartCount">0</span></a>

</nav>

</header>


<section class="hero">

<div class="hero-box">

<h2>Welcome To Foodies Food 2.0</h2>

<p>Best Taste • Fast Delivery • Fresh Food</p>

<a href="#menuContainer" class="hero-btn">View Menu</a>

<a href="catering.html" class="hero-btn">Catering Service</a>

</div>

</section>


<div class="search-box">

<input type="text" id="search" placeholder="Search food...">

</div>


<div class="category-slider" id="categorySlider"></div>


<section id="menuContainer"></section>


<div class="cart">

<h3>🛒 Cart</h3>

<ul id="cartItems"></ul>

<p>Total ₹ <span id="total">0</span></p>

<input id="name" placeholder="Customer Name">

<input id="phone" placeholder="Phone">

<select id="type">

<option>Home Delivery</option>

<option>Dine In</option>

<option>Take Away</option>

</select>

<input id="landmark" placeholder="Landmark">

<button onclick="clearCart()">Clear</button>

<button onclick="order()">Order</button>

</div>


<div class="whatsapp" onclick="order()">📲</div>


<div class="thankyou" id="thanks">

<h2>🎉 Order Successful</h2>

<p id="orderID"></p>

<p>Estimated Delivery: 30 Minutes</p>

<button onclick="closeThanks()">Close</button>

</div>


<footer>

<p>© 2026 Foodies Food 2.0</p>

</footer>


<script>

let cart=[]
let total=0
let cartCount=0


fetch("menu.json")

.then(res=>res.json())

.then(data=>{

createCategories(data.menu)

showMenu(data.menu)

})


function createCategories(menu){

let slider=document.getElementById("categorySlider")

menu.forEach(cat=>{

let btn=document.createElement("button")

btn.className="category-btn"

btn.innerText=cat.category

btn.onclick=()=>scrollToCategory(cat.category)

slider.appendChild(btn)

})

}


function scrollToCategory(name){

document.getElementById(name).scrollIntoView({behavior:"smooth"})

}


function showMenu(menu){

let container=document.getElementById("menuContainer")

menu.forEach(cat=>{

let title=document.createElement("h3")

title.id=cat.category

title.innerText=cat.category

container.appendChild(title)


cat.items.forEach(item=>{

let qty=1

let div=document.createElement("div")

div.className="menu-item"

div.innerHTML=`

<span>${item.name} - ₹${item.price}</span>

<div class="qty-box">

<button class="qty-btn">-</button>

<span class="qty">1</span>

<button class="qty-btn">+</button>

<button class="add-btn">Add</button>

</div>

`

let qtySpan=div.querySelector(".qty")

let btns=div.querySelectorAll(".qty-btn")


btns[0].onclick=()=>{

if(qty>1){qty--;qtySpan.innerText=qty}

}


btns[1].onclick=()=>{

qty++;qtySpan.innerText=qty

}


div.querySelector(".add-btn").onclick=()=>{

let price=item.price*qty

total+=price

cart.push(item.name+" x"+qty)

cartCount++

document.getElementById("cartCount").innerText=cartCount

document.getElementById("total").innerText=total


let li=document.createElement("li")

li.innerText=item.name+" x"+qty

document.getElementById("cartItems").appendChild(li)

}


container.appendChild(div)

})

})

}


document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let items=document.querySelectorAll(".menu-item")

items.forEach(i=>{

i.style.display=i.innerText.toLowerCase().includes(value)?"flex":"none"

})

})


function clearCart(){

cart=[]

total=0

cartCount=0

document.getElementById("cartItems").innerHTML=""

document.getElementById("total").innerText=0

document.getElementById("cartCount").innerText=0

}


function order(){

if(cart.length==0){

alert("Cart is empty")

return

}

let name=document.getElementById("name").value

let phone=document.getElementById("phone").value

let type=document.getElementById("type").value

let landmark=document.getElementById("landmark").value

let id="ORD"+Math.floor(Math.random()*100000)


let msg="Order ID: "+id+"%0A"

msg+="Name: "+name+"%0A"

msg+="Phone: "+phone+"%0A"

msg+="Items:%0A"

cart.forEach(i=>{msg+=i+"%0A"})

msg+="Total ₹"+total+"%0A"

msg+="Type: "+type+"%0A"

msg+="Landmark: "+landmark


window.open("https://wa.me/919938467223?text="+msg)

document.getElementById("orderID").innerText="Order ID: "+id

document.getElementById("thanks").style.display="block"

}


function closeThanks(){

document.getElementById("thanks").style.display="none"

}

</script>

</body>

</html>
