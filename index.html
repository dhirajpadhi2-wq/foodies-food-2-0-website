<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foodies Food 2.0</title>

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

/* HEADER */

header{
background:#000;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}

header h1{
color:gold;
letter-spacing:2px;
}

nav{
display:flex;
justify-content:center;
gap:20px;
padding:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:gold;
}

/* SLIDER */

.slider img{
width:100%;
height:300px;
object-fit:cover;
border-bottom:2px solid gold;
}

/* HERO */

.hero{
height:50vh;
background:url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092");
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h2{
background:rgba(0,0,0,0.6);
padding:20px;
border:2px solid gold;
font-size:35px;
}

/* SECTIONS */

section{
padding:40px;
}

h2{
color:gold;
text-align:center;
}

/* MENU */

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.food-card{
background:#111;
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid #222;
transition:.4s;
}

.food-card:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.food-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:gold;
font-weight:bold;
}

.add-btn{
background:gold;
border:none;
padding:8px 15px;
cursor:pointer;
margin-top:10px;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 15px gold;
}

/* CONTACT */

.contact{
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

/* CART */

.cart{
position:fixed;
right:10px;
bottom:10px;
background:#111;
padding:20px;
border-radius:10px;
border:1px solid gold;
width:200px;
}

/* FOOTER */

footer{
background:black;
text-align:center;
padding:20px;
border-top:2px solid gold;
}

/* LOADER */


</style>
</head>

<body>


<header>

<h1>Foodies Food 2.0</h1>

<nav>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

</header>

<div class="slider">
<img id="slide" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
</div>

<div class="hero">
<h2>Delicious Food • Luxury Taste</h2>
</div>

<section id="menu">

<h2>Our Special Menu</h2>

<div class="menu-grid">

<div class="food-card">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<h3>Pizza</h3>
<p class="price">₹199</p>
<button class="add-btn" onclick="addToCart('Pizza',199)">Add to Cart</button>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>Burger</h3>
<p class="price">₹120</p>
<button class="add-btn" onclick="addToCart('Burger',120)">Add to Cart</button>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1604908176997-43154a4d02e0">
<h3>Biryani</h3>
<p class="price">₹180</p>
<button class="add-btn" onclick="addToCart('Biryani',180)">Add to Cart</button>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1585032226651-759b368d7246">
<h3>Noodles</h3>
<p class="price">₹140</p>
<button class="add-btn" onclick="addToCart('Noodles',140)">Add to Cart</button>
</div>

</div>

</section>

<section id="gallery">

<h2>Food Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1604908176997-43154a4d02e0">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

</div>

</section>

<section id="contact">

<h2>Contact Us</h2>

<div class="contact">

<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea placeholder="Message"></textarea>

<button>Send Message</button>

<div class="map">

<iframe src="https://maps.google.com/maps?q=foodies%20food%202.0&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="250"></iframe>

</div>

</div>

</section>

<div class="cart">

<h3>🛒 Cart</h3>

<ul id="cart-items"></ul>

<p>Total: ₹<span id="total">0</span></p>

<button onclick="orderWhatsApp()">Order via WhatsApp</button>

</div>

<footer>

<p>© 2026 Foodies Food 2.0</p>

</footer>

<script>


let cart=[];
let total=0;

function addToCart(name,price){

cart.push(name);

total+=price;

document.getElementById("total").innerText=total;

let li=document.createElement("li");

li.innerText=name+" - ₹"+price;

document.getElementById("cart-items").appendChild(li);

}

function orderWhatsApp(){

let message="Hello I want to order:%0A";

cart.forEach(item=>{
message+=item+"%0A";
});

message+="Total ₹"+total;

window.open("https://wa.me/919938467223?text="+message);

}

/* SLIDER */

let images=[
"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38",
"https://images.unsplash.com/photo-1550547660-d9450f859349",
"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
];

let i=0;

setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},3000);

</script>

</body>
</html>
