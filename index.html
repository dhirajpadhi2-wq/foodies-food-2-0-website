<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foodies Food 2.0</title>

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}

header h1{
color:gold;
letter-spacing:3px;
}

nav{
display:flex;
justify-content:center;
gap:25px;
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:gold;
}

.slider img{
width:100%;
height:350px;
object-fit:cover;
border-bottom:2px solid gold;
}

section{
padding:40px;
}

h2{
text-align:center;
color:gold;
margin-bottom:30px;
}

.category-title{
color:gold;
margin-top:40px;
}

.menu-item{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
padding:10px;
}

.qty-box{
display:flex;
align-items:center;
gap:5px;
}

.qty-btn{
background:gold;
border:none;
padding:5px 10px;
cursor:pointer;
}

.add-btn{
background:gold;
border:none;
padding:6px 12px;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.cart{
position:fixed;
right:10px;
bottom:80px;
background:#111;
padding:20px;
border-radius:10px;
width:250px;
border:1px solid gold;
max-height:350px;
overflow:auto;
}

.cart h3{
color:gold;
}

.cart button{
margin-top:5px;
}

.whatsapp{
position:fixed;
bottom:10px;
right:10px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
font-size:18px;
cursor:pointer;
}

.map iframe{
width:100%;
height:300px;
border:0;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid gold;
margin-top:40px;
}

.order-options{
margin-top:10px;
}

input{
width:100%;
padding:5px;
margin-top:5px;
}

</style>
</head>

<body>

<header>

<h1>Foodies Food 2.0</h1>

<nav>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Location</a>
</nav>

</header>


<div class="slider">
<img id="slide" src="https://source.unsplash.com/1600x500/?restaurant-food">
</div>


<section id="menu">

<h2>Our Full Menu</h2>

<div id="menuContainer"></div>

</section>


<section id="gallery">

<h2>Restaurant Gallery</h2>

<div class="gallery">

<img src="https://source.unsplash.com/400x300/?restaurant">
<img src="https://source.unsplash.com/400x300/?food-plate">
<img src="https://source.unsplash.com/400x300/?biryani">
<img src="https://source.unsplash.com/400x300/?indian-food">

</div>

</section>


<section id="contact">

<h2>Find Us</h2>

<div class="map">

<iframe src="https://maps.google.com/maps?q=restaurant&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

</section>


<div class="cart">

<h3>🛒 Cart</h3>

<ul id="cartItems"></ul>

<p>Total ₹ <span id="total">0</span></p>

<div class="order-options">

<select id="orderType">
<option>Home Delivery</option>
<option>Dine In</option>
<option>Take Away</option>
</select>

<input id="landmark" placeholder="Enter Landmark">

</div>

<button onclick="clearCart()">Clear Cart</button>

<button onclick="orderWhatsApp()">Order</button>

</div>


<div class="whatsapp" onclick="orderWhatsApp()">
📲 Order
</div>


<footer>

<p>© 2026 Foodies Food 2.0</p>

</footer>


<script>

let cart=[];
let total=0;

fetch("menu.json")

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("menuContainer");

data.menu.forEach(category=>{

let title=document.createElement("h3");
title.className="category-title";
title.innerText=category.category;

container.appendChild(title);

category.items.forEach(item=>{

let qty=1;

let div=document.createElement("div");
div.className="menu-item";

div.innerHTML=`

<span>${item.name} - ₹${item.price}</span>

<div class="qty-box">

<button class="qty-btn">-</button>

<span class="qty">1</span>

<button class="qty-btn">+</button>

<button class="add-btn">Add</button>

</div>

`;

let qtySpan=div.querySelector(".qty");

let buttons=div.querySelectorAll(".qty-btn");

buttons[0].onclick=()=>{
if(qty>1){
qty--;
qtySpan.innerText=qty;
}
}

buttons[1].onclick=()=>{
qty++;
qtySpan.innerText=qty;
}

div.querySelector(".add-btn").onclick=()=>{

let price=parseInt(item.price)*qty;

total+=price;

cart.push(item.name+" x"+qty);

document.getElementById("total").innerText=total;

let li=document.createElement("li");
li.innerText=item.name+" x"+qty;

document.getElementById("cartItems").appendChild(li);

}

container.appendChild(div);

});

});

});


function clearCart(){

cart=[];
total=0;

document.getElementById("cartItems").innerHTML="";
document.getElementById("total").innerText="0";

}


function orderWhatsApp(){

let type=document.getElementById("orderType").value;
let landmark=document.getElementById("landmark").value;

let message="Hello I want to order:%0A";

cart.forEach(i=>{
message+=i+"%0A";
});

message+="Order Type: "+type+"%0A";
message+="Landmark: "+landmark+"%0A";
message+="Total ₹"+total;

window.open("https://wa.me/919938467223?text="+message);

}


let images=[
"https://source.unsplash.com/1600x500/?pizza",
"https://source.unsplash.com/1600x500/?burger",
"https://source.unsplash.com/1600x500/?biryani",
"https://source.unsplash.com/1600x500/?indian-food"
];

let i=0;

setInterval(()=>{

i=(i+1)%images.length;

document.getElementById("slide").src=images[i];

},3000);

</script>

</body>
</html>
