<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodies Food 2.0</title>

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}

header h1{
color:gold;
letter-spacing:3px;
}

nav{
display:flex;
justify-content:center;
gap:25px;
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:gold;
}

.slider img{
width:100%;
height:350px;
object-fit:cover;
border-bottom:2px solid gold;
}

section{
padding:40px;
}

h2{
text-align:center;
color:gold;
margin-bottom:30px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.food-card{
background:#111;
padding:15px;
border-radius:15px;
text-align:center;
border:1px solid #222;
transition:.4s;
}

.food-card:hover{
transform:scale(1.05);
box-shadow:0 0 15px gold;
}

.food-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:gold;
font-weight:bold;
}

.qty{
width:60px;
margin-top:5px;
}

.add-btn{
background:gold;
border:none;
padding:8px 15px;
cursor:pointer;
margin-top:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.cart{
position:fixed;
right:10px;
bottom:80px;
background:#111;
padding:20px;
border-radius:10px;
width:230px;
border:1px solid gold;
max-height:300px;
overflow:auto;
}

.cart h3{
color:gold;
}

.whatsapp{
position:fixed;
bottom:10px;
right:10px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
font-size:18px;
text-decoration:none;
}

.map iframe{
width:100%;
height:300px;
border:0;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid gold;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>Foodies Food 2.0</h1>

<nav>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>
</header>

<div class="slider">
<img id="slide" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
</div>

<section id="menu">

<h2>Our Full Menu</h2>

<div class="menu-grid" id="menuContainer"></div>

</section>

<section id="gallery">

<h2>Restaurant Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<img src="https://images.unsplash.com/photo-1604908176997-43154a4d02e0">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">

</div>

</section>

<section id="contact">

<h2>Find Us</h2>

<div class="map">

<iframe src="https://maps.google.com/maps?q=restaurant&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

</section>

<div class="cart">

<h3>🛒 Cart</h3>

<ul id="cartItems"></ul>

<p>Total: ₹<span id="total">0</span></p>

<button onclick="orderWhatsApp()">Order</button>

</div>

<a class="whatsapp" onclick="orderWhatsApp()">Order WhatsApp</a>

<footer>

<p>© 2026 Foodies Food 2.0</p>

</footer>

<script>

const menu=[

{
  "menu":[

{
"category":"Chinese Non Veg",
"items":[
{"name":"Chilly Chicken","price":"120"},
{"name":"Boneless Chilly Chicken","price":"140"},
{"name":"Chicken Manchurian","price":"120"},
{"name":"Chicken Pakoda","price":"100"},
{"name":"Chicken 65","price":"120"},
{"name":"Chicken Lollipop","price":"130"},
{"name":"Chicken Majestic","price":"140"},
{"name":"Chicken 555","price":"160"},
{"name":"Hot Garlic Chicken","price":"160"},
{"name":"Schezwan Chicken","price":"160"},
{"name":"Chicken Salt & Pepper","price":"120"},
{"name":"Red Chilly Pepper Chicken","price":"130"},
{"name":"Dragon Chicken","price":"160"},
{"name":"Garlic Chicken","price":"120"},
{"name":"Prawn Chilly","price":"200"},
{"name":"Fish Chilly","price":"180"}
]
},

{
"category":"Chinese Veg",
"items":[
{"name":"Chilly Paneer","price":"120"},
{"name":"Paneer Manchurian","price":"120"},
{"name":"Paneer 65","price":"140"},
{"name":"Schezwan Paneer","price":"140"},
{"name":"Dragon Paneer","price":"160"},
{"name":"Paneer 555","price":"160"},
{"name":"Chilly Mushroom","price":"120"},
{"name":"Mushroom Manchurian","price":"120"},
{"name":"Mushroom 65","price":"120"},
{"name":"Schezwan Mushroom","price":"140"},
{"name":"Chilly Kobi","price":"100"}
]
},

{
"category":"Indian Non Veg",
"items":[
{"name":"Butter Chicken","price":"140"},
{"name":"Chicken Mughlai","price":"150"},
{"name":"Chicken Hyderabadi","price":"140"},
{"name":"Chicken Punjabi","price":"150"},
{"name":"Chicken Kolhapuri","price":"140"},
{"name":"Kundan Chicken","price":"150"},
{"name":"Chicken Masala","price":"120"},
{"name":"Chicken Kasa","price":"120"},
{"name":"Chicken Tikka Masala","price":"160"},
{"name":"Chicken Lababdar","price":"160"}
]
},

{
"category":"Biryani & Rice",
"items":[
{"name":"Chicken Dum Biryani","price":"130"},
{"name":"Mutton Biryani","price":"220"},
{"name":"Veg Fried Rice","price":"70"},
{"name":"Egg Fried Rice","price":"80"}
]
},

{
"category":"Breads",
"items":[
{"name":"Butter Naan","price":"25"},
{"name":"Plain Naan","price":"20"},
{"name":"Lachha Paratha","price":"20"},
{"name":"Plain Paratha","price":"10"},
{"name":"Tandoori Roti","price":"15"},
{"name":"Chapati","price":"7"}
]
},

{
"category":"Rolls",
"items":[
{"name":"Veg Roll","price":"50"},
{"name":"Egg Roll","price":"60"},
{"name":"Chicken Egg Roll","price":"70"}
]
},

{
"category":"Drinks",
"items":[
{"name":"Masala Cola Drinks","price":"40"},
{"name":"Mineral Water","price":"20"}
]
}

]};
  
let cart=[];
let total=0;

const container=document.getElementById("menuContainer");

menu.forEach((item,index)=>{

let card=document.createElement("div");
card.className="food-card";

card.innerHTML=`

<img src="https://source.unsplash.com/300x200/?${item.name}">

<h3>${item.name}</h3>

<p class="price">₹${item.price}</p>

<input type="number" value="1" min="1" class="qty" id="qty${index}">

<br>

<button class="add-btn" onclick="addToCart(${index})">Add to Cart</button>

`;

container.appendChild(card);

});

function addToCart(i){

let qty=document.getElementById("qty"+i).value;

let item=menu[i];

let price=item.price*qty;

total+=price;

cart.push(item.name+" x"+qty);

document.getElementById("total").innerText=total;

let li=document.createElement("li");

li.innerText=item.name+" x"+qty;

document.getElementById("cartItems").appendChild(li);

}

function orderWhatsApp(){

let message="Hello I want to order:%0A";

cart.forEach(i=>{
message+=i+"%0A";
});

message+="Total ₹"+total;

window.open("https://wa.me/919938467223?text="+message);

}

let images=[
"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38",
"https://images.unsplash.com/photo-1550547660-d9450f859349",
"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
];

let i=0;

setInterval(()=>{

i=(i+1)%images.length;

document.getElementById("slide").src=images[i];

},3000);

</script>

</body>
</html>
