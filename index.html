<!DOCTYPE html>
<html>
<head>

<title>Foodies Food 2.0</title>

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
border-bottom:2px solid gold;
}

header h1{
color:gold;
}

nav{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:gold;
}

.slider img{
width:100%;
height:350px;
object-fit:cover;
}

section{
padding:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.map iframe{
width:100%;
height:300px;
border:0;
}

.menu-btn{
display:block;
margin:auto;
background:gold;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>Foodies Food 2.0</h1>

<nav>

<a href="index.html">Home</a>
<a href="menu.html">Menu</a>

</nav>

</header>

<div class="slider">

<img id="slide" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">

</div>

<section>

<h2 style="text-align:center;color:gold;">Explore Our Menu</h2>

<a href="menu.html">
<button class="menu-btn">View Full Menu</button>
</a>

</section>

<section>

<h2 style="text-align:center;color:gold;">Restaurant Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

</div>

</section>

<section>

<h2 style="text-align:center;color:gold;">Find Us</h2>

<div class="map">

<iframe src="https://maps.google.com/maps?q=restaurant&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

</section>

<script>

let images=[
"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38",
"https://images.unsplash.com/photo-1550547660-d9450f859349",
"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
];

let i=0;

setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},3000);

</script>

</body>
</html>
